version: '3.8'

services:
  warface-bot:
    # Usa imagem local ou builda
    build:
      context: .
      dockerfile: Dockerfile
    container_name: warface-bot-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DATA_REFRESH_MINUTES=5 # mais rápido para dev
    volumes:
      # Montar código fonte para hot-reload de dados
      - .:/app
      - /app/node_modules # evitar overwrite de node_modules
      - ./logs:/app/logs
    ports:
      - "3000:3000" # healthcheck
    # Comando para dev com watch (usando nodemon se disponível)
    command: >
      sh -c "
        if command -v nodemon >/dev/null 2>&1; then
          echo '🚀 Usando nodemon para hot-reload...';
          exec nodemon bot.js;
        else
          echo '🚀 Executando node padrão...';
          exec node bot.js;
        fi
      "
    # Shell para debug
    stdin_open: true
    tty: true
