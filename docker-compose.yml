version: '3.8'

services:
  warface-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: warface-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HEALTHCHECK_PORT=3000
    ports:
      # Healthcheck interno (opcional expor)
      - "3000:3000"
    volumes:
      # Persistir logs localmente
      - ./logs:/app/logs
      # Cache de imagens (opcional)
      - ./image-cache:/app/image-cache
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bot-network

  # Opcional: Redis para cache distribuído (se usar múltiplas instâncias)
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - bot-network

networks:
  bot-network:
    driver: bridge

