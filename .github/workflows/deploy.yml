name: Deploy Bot

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Permite trigger manual

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-and-lint:
    name: 🧪 Testes e Lint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🔍 Verificar sintaxe
        run: node --check bot.js

      - name: 📚 Validar package.json
        run: node -e "require('./package.json')"

      - name: 🧹 Lint básico (eslint se disponível)
        run: |
          if [ -f "package.json" ] && grep -q "eslint" package.json; then
            npx eslint bot.js || true
          else
            echo "ESLint não configurado, pulando..."
          fi

  build-and-push:
    name: 🐳 Build e Push Docker Image
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🔧 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login ao GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🐳 Build e Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-railway:
    name: 🚀 Deploy para Railway
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 🚂 Trigger deploy Railway
        run: |
          curl -X POST \
            https://backboard.railway.app/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -d '{"query":"mutation { deployRailwayDeployment(deployableId: \"${{ secrets.RAILWAY_DEPLOYMENT_ID }}\", force: true) { id } }"}'

  deploy-render:
    name: 🚀 Deploy para Render
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 🎨 Trigger deploy Render
        run: |
          curl -X POST \
            https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"

  notify:
    name: 📢 Notificar sucesso
    needs: [build-and-push, deploy-railway, deploy-render]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: ✅ Check status
        run: |
          echo "🎉 Deploy concluído!"
          echo "📦 Imagem Docker: ghcr.io/${{ github.repository }}:latest"
          echo "🔗 Logs do workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
